name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: PYTHONPATH=. pytest -v

  build-css:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tailwind
        run: npm ci

      - name: Build CSS
        run: npx tailwindcss -i ./static/css/input.css -o ./static/css/output.css --minify

      - name: Upload CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-css
          path: static/css/output.css

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-css]
    if: github.ref == 'refs/heads/main'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download built CSS
        uses: actions/download-artifact@v4
        with:
          name: built-css
          path: static/css

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Prepare remote directory
        run: |
          sshpass -p "${{ secrets.ALWAYSDATA_SSH_PASS }}" ssh -o StrictHostKeyChecking=no "${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }}" "find ${{ secrets.ALWAYSDATA_PATH }} -mindepth 1 -not -name 'place.db' -delete 2>/dev/null; mkdir -p ${{ secrets.ALWAYSDATA_PATH }}; echo ok"

      - name: Deploy to AlwaysData
        run: |
          sshpass -p "${{ secrets.ALWAYSDATA_SSH_PASS }}" rsync -avz -e "ssh -o StrictHostKeyChecking=no" --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude 'node_modules' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude '__pycache__' \
            --exclude 'place.db' \
            --exclude '.gitignore' \
            ./ \
            "${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }}:${{ secrets.ALWAYSDATA_PATH }}"
