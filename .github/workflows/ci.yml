name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv
        run: python -m venv env

      - name: Install dependencies
        run: |
          env/bin/pip install -r requirements.txt
          env/bin/pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: env/bin/ruff check .

      - name: Verify migrations are valid
        run: |
          rm -f /tmp/test_migration.db
          DATABASE_URL=sqlite:////tmp/test_migration.db PYTHONPATH=. env/bin/alembic upgrade head

      - name: Run tests
        run: PYTHONPATH=. env/bin/pytest -v

  build-css:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tailwind
        run: npm ci

      - name: Build CSS
        run: npx tailwindcss -i ./static/css/input.css -o ./static/css/output.css --minify

      - name: Upload CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-css
          path: static/css/output.css

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-css]
    if: github.ref == 'refs/heads/main'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download built CSS
        uses: actions/download-artifact@v4
        with:
          name: built-css
          path: static/css

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Prepare remote directory
        run: |
          sshpass -p "${{ secrets.ALWAYSDATA_SSH_PASS }}" ssh -o StrictHostKeyChecking=no "${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }}" "mkdir -p ${{ secrets.ALWAYSDATA_PATH }}; find ${{ secrets.ALWAYSDATA_PATH }} -mindepth 1 -not -name 'place.db' -not -name 'env' -exec rm -rf {} \; 2>/dev/null; echo ok"

      - name: Deploy to AlwaysData
        run: |
          sshpass -p "${{ secrets.ALWAYSDATA_SSH_PASS }}" rsync -avz -e "ssh -o StrictHostKeyChecking=no" --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'env' \
            --exclude 'node_modules' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude '__pycache__' \
            --exclude 'place.db' \
            --exclude '.gitignore' \
            --exclude 'passenger_wsgi.py' \
            ./ \
            "${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }}:${{ secrets.ALWAYSDATA_PATH }}"

      - name: Setup server virtualenv and install dependencies
        run: |
          sshpass -p "${{ secrets.ALWAYSDATA_SSH_PASS }}" ssh -o StrictHostKeyChecking=no "${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }}" "
          cd ${{ secrets.ALWAYSDATA_PATH }}
          rm -rf env
          python3.12 -m venv env
          env/bin/pip install --upgrade pip
          env/bin/pip install -r requirements.txt
          "

      - name: Apply database migrations on server
        run: |
          sshpass -p "${{ secrets.ALWAYSDATA_SSH_PASS }}" ssh -o StrictHostKeyChecking=no "${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }}" "
          cd ${{ secrets.ALWAYSDATA_PATH }}
          PYTHONPATH=. env/bin/alembic upgrade head
          "
