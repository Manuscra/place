<style>
body {
  background: #f5f5f7;
  padding: 40px;
}

/* grille FIXE : 2 lignes */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 120px); /* 4 colonnes */
  grid-template-rows: repeat(4, auto);     /* 2 lignes */
  gap: 40px;
  justify-content: center;
}

/* tuile */
.tile {
  text-align: center;
  padding: 15px;
  border-radius: 12px;
  background: white;
  text-decoration: none;
  color: #333;
  transition: 0.2s;
  border: 1px solid #eee;
}

.tile:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

/* icône */
.icon img {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  margin-bottom: 10px;
}
</style>

</head>
