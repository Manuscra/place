<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MyEnt Place</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
</head>
<body class="h-full bg-gray-50 flex items-center justify-center px-4">
    <div class="flex items-stretch rounded-2xl overflow-hidden shadow-lg border border-black">
        <div class="w-full max-w-md overflow-hidden rounded-l-2xl">
            <img src="{{ url_for('static', filename='img/ent.jpeg') }}" alt="ENT" class="w-full h-full object-cover min-h-full block">
        </div>
        <div class="w-full max-w-md bg-indigo-600 p-8 rounded-r-2xl">
        <div class="text-center mb-8">
        </div>
        <form method="POST" class="space-y-6">
            <div>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    autofocus
                    class="w-full px-4 py-2 border border-indigo-300 rounded-lg focus:ring-2 focus:ring-white focus:border-transparent outline-none"
                    placeholder="Votre identifiant"
                >
            </div>

            <div>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    class="w-full px-4 py-2 border border-indigo-300 rounded-lg focus:ring-2 focus:ring-white focus:border-transparent outline-none"
                    placeholder="Votre mot de passe"
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-white hover:bg-gray-100 text-indigo-600 font-medium py-2 px-4 rounded-lg transition"
            >
                Se connecter
            </button>
        </form>

        <div class="mt-6 text-center border-t border-indigo-400 pt-6">
            <p class="text-indigo-200 text-sm flex items-center justify-center gap-1">
                <img src="{{ url_for('static', filename='img/favicon.ico') }}" alt="" class="w-5 h-5">
                Pas encore de compte?
                <a href="{{ url_for('auth.register') }}" class="text-white hover:text-gray-200 font-medium">
                    S'inscrire
                </a>
            </p>
        </div>
    </div>
    </div>
</body>
</html>
