<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Place - Gestion d'équipe{% endblock %}</title>
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body class="h-full bg-gray-50">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{{ url_for('index') }}" class="text-lg font-bold text-indigo-600">Place</a>
            <div class="flex gap-4 text-sm text-gray-600">
                <a href="{{ url_for('place.index') }}" class="hover:text-indigo-600">Placement</a>
                <a href="{{ url_for('classes_page') }}" class="hover:text-indigo-600">Classes</a>
                <a href="{{ url_for('projets_page') }}" class="hover:text-indigo-600">Projets</a>
                <a href="{{ url_for('groupes_page') }}" class="hover:text-indigo-600">Groupes</a>
                <a href="{{ url_for('eleves_page') }}" class="hover:text-indigo-600">Élèves</a>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
