<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyEnt - Gestion d'équipe{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body class="h-full bg-gray-50">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{{ url_for('index') }}" class="text-lg font-bold text-indigo-600">{% block page_title %}Répartition des élèves{% endblock %}</a>
            <div class="flex gap-4 items-center">
                <div class="flex gap-4 text-sm text-gray-600">
                    <a href="{{ url_for('classes_page') }}" class="hover:text-indigo-600">Classes</a>
                    <a href="{{ url_for('eleves_page') }}" class="hover:text-indigo-600">Élèves</a>
                    <a href="{{ url_for('activites_page') }}" class="hover:text-indigo-600">Activités</a>
                    <a href="{{ url_for('distribution_page') }}" class="hover:text-indigo-600">Distribution</a>
                </div>
                <div class="border-l pl-4">
                    <span class="text-sm text-gray-600 mr-3">{{ session.get('username', 'Utilisateur') }}</span>
                    <form method="POST" action="{{ url_for('auth.logout') }}" style="display: inline;">
                        <button type="submit" class="text-sm text-gray-600 hover:text-red-600">Déconnexion</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    <script>var API_BASE = "{{ url_for('static', filename='x') }}".split("/static")[0];</script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
