{% extends "base.html" %}
{% block title %}Classes - MyEnt{% endblock %}
{% block page_title %}Classes{% endblock %}
{% block content %}

<div class="bg-white rounded-lg shadow p-6 mb-8">
    <form id="create-classe" class="flex items-center gap-4">
        <input type="text" name="nom" placeholder="Nom de la nouvelle classe" required
               class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        <input type="text" name="description" placeholder="Prof. Principal"
               class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        <button type="submit" class="bg-indigo-600 text-white rounded px-4 py-2 hover:bg-indigo-700 transition w-fit">
            Créer
        </button>
        <input type="file" id="csv-file" accept=".csv,.xml" class="hidden">
        <button type="button" id="import-csv" class="bg-green-600 text-white rounded px-4 py-2 hover:bg-green-700 transition w-fit flex items-center gap-1" title="La première ligne contiendra les champs : NOM_DE_FAMILLE | PRENOM | CODE_STRUCTURE">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            Importer .csv
        </button>
        <button type="button" id="reset-db" class="bg-red-500 text-white rounded px-4 py-2 hover:bg-red-600 transition w-fit flex items-center gap-1" title="Vider la base de données">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Vider la BDD
        </button>
    </form>
</div>

<div id="classes-list" class="grid gap-4"></div>
{% endblock %}
