{% extends "base.html" %}
{% block title %}Élèves - Place{% endblock %}
{% block page_title %}Élèves{% endblock %}
{% block content %}

<div class="bg-white rounded-lg shadow p-6 mb-8">
    <h2 class="text-lg font-semibold mb-4">Nouvel élève</h2>
    <form id="create-eleve" class="flex flex-col gap-4 max-w-md">
        <input type="text" name="prenom" placeholder="Prénom" required
               class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        <input type="text" name="nom" placeholder="Nom" required
               class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        <select name="classe_id" class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            <option value="">-- Choisir une classe --</option>
        </select>
        <button type="submit" class="bg-indigo-600 text-white rounded px-4 py-2 hover:bg-indigo-700 transition w-fit">
            Créer
        </button>
    </form>
</div>

<div id="eleves-list" class="grid gap-4"></div>
{% endblock %}
