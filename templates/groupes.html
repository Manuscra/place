{% extends "base.html" %}
{% block title %}Groupes - Place{% endblock %}
{% block page_title %}Groupes{% endblock %}
{% block content %}

<div class="bg-white rounded-lg shadow p-6 mb-8">
    <h2 class="text-lg font-semibold mb-4">Nouveau groupe</h2>
    <form id="create-groupe" class="flex flex-col gap-4 max-w-md">
        <input type="text" name="nom" placeholder="Nom du groupe" required
               class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        <select name="projet_id" class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            <option value="">-- Choisir un projet --</option>
        </select>
        <button type="submit" class="bg-indigo-600 text-white rounded px-4 py-2 hover:bg-indigo-700 transition w-fit">
            Créer
        </button>
    </form>
</div>

<div id="groupes-list" class="grid gap-4"></div>
{% endblock %}
