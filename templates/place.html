{% extends "base.html" %}
{% block title %}Répartition des élèves - Place{% endblock %}
{% block page_title %}Répartition des élèves{% endblock %}
{% block head_extra %}
<style>
    .group-box { min-height: 320px; }
    .students-zone {
        min-height: 220px;
        border: 2px dashed #d0d0d0;
        border-radius: 6px;
        padding: 10px;
        background: #fafafa;
        transition: 0.2s;
    }
    .students-zone.drag-over {
        background: #e8f4ff;
        border-color: #3498db;
    }
    .student-card {
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 5px;
        color: white;
        cursor: grab;
        user-select: none;
    }
    .student-card:active { cursor: grabbing; }
    .student-card:nth-child(odd) { background: #3498db; }
    .student-card:nth-child(even) { background: #2ecc71; }
    .badge {
        background: #3498db;
        color: white;
        border-radius: 20px;
        padding: 2px 10px;
        font-size: 12px;
    }
    .rename-input {
        width: 140px;
        padding: 4px;
        border: 1px solid #ccc;
        border-radius: 4px;
        color: #000;
    }
    .add-group-btn {
        width: 260px;
        min-height: 120px;
        border: 2px dashed #c0c0c0;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: #fafafa;
        transition: 0.2s;
    }
    .add-group-btn:hover {
        border-color: #6366f1;
        background: #eef2ff;
    }
    .add-group-btn span {
        font-size: 32px;
        color: #a0a0a0;
        user-select: none;
    }
    .new-projet-input {
        border: 2px dashed #6366f1;
        background: #eef2ff;
        border-radius: 4px;
        padding: 2px 8px;
    }
</style>
{% endblock %}
{% block content %}
<div class="space-y-6">

    <div class="bg-white rounded-lg shadow p-6 mb-8">
        <div class="flex items-center gap-4 flex-wrap">
            <select id="classSelect" class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <option value="">-- Choisir une classe --</option>
            </select>
            <select id="projetSelect" class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" disabled>
                <option value="">-- Choisir un projet --</option>
            </select>
            <input id="newProjetInput" type="text" placeholder="Nouveau projet..." style="display:none"
                   class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 new-projet-input">
            <button id="createProjetBtn" class="bg-indigo-600 text-white rounded px-4 py-2 hover:bg-indigo-700 transition w-fit" disabled>
                Créer un projet
            </button>
        </div>
    </div>

    <div id="groupsContainer" class="flex flex-wrap gap-5"></div>

    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">Élèves non affectés</h3>
        <div class="students-zone" id="unassigned"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const container = document.getElementById('groupsContainer');
const unassigned = document.getElementById('unassigned');
const classSelect = document.getElementById('classSelect');
const projetSelect = document.getElementById('projetSelect');
const newProjetInput = document.getElementById('newProjetInput');
const createProjetBtn = document.getElementById('createProjetBtn');
let currentProjetId = null;
let currentClasseId = null;
let groupCount = 0;
let draggedStudent = null;
let currentEleves = [];

async function api(url, opts = {}) {
    const res = await fetch(API_BASE + url, {
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

// --- Chargement des classes ---
async function loadClasses() {
    const classes = await api('/api/classes');
    classSelect.innerHTML = '<option value="">-- Choisir une classe --</option>';
    classes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.nom;
        classSelect.appendChild(opt);
    });
}

// --- Changement de classe ---
classSelect.addEventListener('change', async (e) => {
    currentClasseId = e.target.value ? parseInt(e.target.value) : null;
    projetSelect.innerHTML = '<option value="">-- Choisir un projet --</option>';
    createProjetBtn.disabled = true;
    currentProjetId = null;
    resetGroups();
    unassigned.innerHTML = '';

    if (!currentClasseId) {
        projetSelect.disabled = true;
        return;
    }

    const projets = await api('/api/projets?classe_id=' + currentClasseId);
    projetSelect.disabled = false;
    createProjetBtn.disabled = false;
    if (projets.length === 0) {
        projetSelect.innerHTML += '<option value="" disabled>Aucun projet</option>';
    } else {
        projets.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.nom;
            projetSelect.appendChild(opt);
        });
    }
});

// --- Création projet ---
createProjetBtn.addEventListener('click', async () => {
    if (!currentClasseId) return;
    const nom = newProjetInput.style.display === 'none' ? null : newProjetInput.value.trim();
    if (!nom) {
        newProjetInput.style.display = 'inline-block';
        newProjetInput.focus();
        newProjetInput.placeholder = 'Nom du nouveau projet...';
        createProjetBtn.textContent = 'Valider';
        return;
    }
    try {
        const p = await api('/api/projets', {
            method: 'POST',
            body: JSON.stringify({ nom: nom, classe_id: currentClasseId })
        });
        newProjetInput.style.display = 'none';
        newProjetInput.value = '';
        createProjetBtn.textContent = 'Créer un projet';
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.nom;
        projetSelect.appendChild(opt);
        projetSelect.value = p.id;
        projetSelect.dispatchEvent(new Event('change'));
    } catch (err) {
        alert('Erreur : ' + err.message);
    }
});

// --- Changement de projet ---
projetSelect.addEventListener('change', async (e) => {
    if (!e.target.value) {
        currentProjetId = null;
        resetGroups();
        unassigned.innerHTML = '';
        return;
    }
    currentProjetId = parseInt(e.target.value);
    await loadPlacement(currentClasseId, currentProjetId);
});

// --- Chargement complet du placement (groupes + élèves non affectés) ---
async function loadPlacement(classeId, projetId) {
    resetGroups();
    unassigned.innerHTML = '';

    if (!classeId || !projetId) return;

    // Charger les groupes du projet
    const groupes = await api('/api/groupes?projet_id=' + projetId);
    groupCount = 0;
    container.innerHTML = '';

    for (const g of groupes) {
        const letter = String.fromCharCode(65 + groupCount);
        const eleves = await api('/api/eleves?groupe_id=' + g.id);
        const div = document.createElement('div');
        div.className = 'bg-white rounded-lg shadow group-box w-[260px] overflow-hidden';
        div.dataset.groupeId = g.id;
        div.innerHTML = `
            <div class="bg-gradient-to-br from-indigo-500 to-indigo-700 text-white px-4 py-3 flex justify-between items-center">
                <h3 class="group-title font-semibold text-sm cursor-pointer select-none hover:text-indigo-200">${g.nom}</h3>
                <div class="flex items-center gap-3">
                    <span class="badge">${eleves.length} élève${eleves.length > 1 ? 's' : ''}</span>
                    <button class="delete-group-btn text-white hover:text-red-300 font-bold text-sm leading-none" title="Supprimer ce groupe">&#128465;</button>
                </div>
            </div>
            <div class="p-3">
                <div class="students-zone"></div>
            </div>
        `;
        const zone = div.querySelector('.students-zone');
        eleves.forEach(e => {
            zone.appendChild(createStudentCard(e));
        });
        container.appendChild(div);
        div.querySelector('.delete-group-btn').addEventListener('click', ev => {
            ev.stopPropagation();
            deleteGroup(div);
        });
        groupCount++;
    }

    enableDropZones();
    enableRenameGroups();
    renderAddButton();
    enableDragStudents();

    // Charger les élèves non affectés pour ce projet
    const unassignedEleves = await api('/api/eleves?classe_id=' + classeId + '&projet_id=' + projetId + '&groupe_id=0');
    currentEleves = unassignedEleves;
    unassignedEleves.forEach(e => {
        unassigned.appendChild(createStudentCard(e));
    });
    enableDragStudents();
    updateCounters();
}

// --- Carte élève ---
function createStudentCard(eleve) {
    const div = document.createElement('div');
    div.className = 'student-card';
    div.draggable = true;
    div.dataset.id = eleve.id;
    div.textContent = `${eleve.prenom} ${eleve.nom}`;
    return div;
}

// --- Reset ---
function resetGroups() {
    container.innerHTML = '';
    groupCount = 0;
    addGroup();
    addGroup();
    renderAddButton();
}

// --- Ajout groupe ---
function addGroup() {
    if (groupCount >= 26) return;
    const letter = String.fromCharCode(65 + groupCount);
    const div = document.createElement('div');
    div.className = 'bg-white rounded-lg shadow group-box w-[260px] overflow-hidden';
    div.innerHTML = `
        <div class="bg-gradient-to-br from-indigo-500 to-indigo-700 text-white px-4 py-3 flex justify-between items-center">
            <h3 class="group-title font-semibold text-sm cursor-pointer select-none hover:text-indigo-200">Groupe ${letter}</h3>
            <div class="flex items-center gap-3">
                <span class="badge">0 élève</span>
                <button class="delete-group-btn text-white hover:text-red-300 font-bold text-sm leading-none" title="Supprimer ce groupe">&#128465;</button>
            </div>
        </div>
        <div class="p-3">
            <div class="students-zone"></div>
        </div>
    `;
    container.appendChild(div);
    div.querySelector('.delete-group-btn').addEventListener('click', ev => {
        ev.stopPropagation();
        deleteGroup(div);
    });
    enableDropZones();
    enableRenameGroups();
    updateCounters();
    groupCount++;
    renderAddButton();
}

// --- Suppression groupe ---
async function deleteGroup(groupBox) {
    if (!confirm("Supprimer ce groupe ? Les élèves seront replacés dans la liste des non affectés.")) return;
    const groupeId = groupBox.dataset.groupeId;
    const cards = groupBox.querySelectorAll('.student-card');
    cards.forEach(card => unassigned.appendChild(card));
    groupBox.remove();
    groupCount--;
    reletterGroups();
    updateCounters();
    renderAddButton();
    await saveAssignments();
    if (groupeId) {
        try {
            await fetch(API_BASE + '/api/groupes/' + groupeId, { method: 'DELETE' });
        } catch (e) { /* ignore */ }
    }
}

function reletterGroups() {
    container.querySelectorAll('.group-box').forEach((box, i) => {
        const title = box.querySelector('.group-title');
        if (title) {
            title.textContent = 'Groupe ' + String.fromCharCode(65 + i);
        }
    });
}

function renderAddButton() {
    const existing = container.querySelector('.add-group-btn');
    if (existing) existing.remove();
    if (groupCount >= 26) return;
    const div = document.createElement('div');
    div.className = 'add-group-btn';
    div.innerHTML = '<span>+</span>';
    div.addEventListener('click', addGroup);
    container.appendChild(div);
}

// --- Drag & drop ---
function enableDragStudents() {
    document.querySelectorAll('.student-card').forEach(card => {
        if (card.dataset.dragEnabled) return;
        card.dataset.dragEnabled = '1';
        card.addEventListener('dragstart', () => {
            draggedStudent = card;
            setTimeout(() => { card.style.display = 'none'; }, 0);
        });
        card.addEventListener('dragend', () => {
            setTimeout(() => {
                card.style.display = 'block';
                draggedStudent = null;
                updateCounters();
            }, 0);
        });
    });
}

function enableDropZones() {
    document.querySelectorAll('.students-zone').forEach(zone => {
        if (zone.dataset.dropEnabled) return;
        zone.dataset.dropEnabled = '1';
        zone.addEventListener('dragover', e => {
            e.preventDefault();
            zone.classList.add('drag-over');
        });
        zone.addEventListener('dragleave', () => {
            zone.classList.remove('drag-over');
        });
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('drag-over');
            if (draggedStudent) {
                zone.appendChild(draggedStudent);
                updateCounters();
                saveAssignments();
            }
        });
    });
}

// --- Renommage ---
function enableRenameGroups() {
    document.querySelectorAll('.group-title').forEach(title => {
        if (title.dataset.renameEnabled) return;
        title.dataset.renameEnabled = '1';
        title.addEventListener('dblclick', () => {
            const current = title.textContent.trim();
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            input.className = 'rename-input';
            title.replaceWith(input);
            input.focus();
            input.select();
            function save() {
                const val = input.value.trim() || current;
                const h3 = document.createElement('h3');
                h3.className = 'group-title font-semibold text-sm cursor-pointer select-none hover:text-indigo-200';
                h3.textContent = val;
                const groupBox = input.closest('.group-box');
                const groupeId = groupBox ? groupBox.dataset.groupeId : null;
                input.replaceWith(h3);
                enableRenameGroups();
                if (groupeId && val !== current) {
                    fetch(API_BASE + '/api/groupes/' + groupeId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nom: val })
                    }).then(() => saveAssignments()).catch(() => {});
                } else {
                    saveAssignments();
                }
            }
            input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
            input.addEventListener('blur', save);
        });
    });
}

// --- Compteurs ---
function updateCounters() {
    document.querySelectorAll('.group-box').forEach(group => {
        const count = group.querySelectorAll('.student-card').length;
        const badge = group.querySelector('.badge');
        if (badge) badge.textContent = count + (count > 1 ? ' élèves' : ' élève');
    });
}

// --- Sauvegarde ---
async function saveAssignments() {
    if (!currentProjetId) return;
    const groupMap = {};
    document.querySelectorAll('.group-box').forEach(box => {
        const name = box.querySelector('.group-title')?.textContent || '';
        if (name) groupMap[name] = box;
    });

    // Élèves dans les groupes
    document.querySelectorAll('.group-box').forEach(group => {
        const groupName = group.querySelector('.group-title')?.textContent || '';
        const cards = group.querySelectorAll('.student-card');
        cards.forEach(card => {
            const body = JSON.stringify({
                eleve_id: parseInt(card.dataset.id),
                groupe: groupName,
                projet_id: currentProjetId
            });
            fetch(API_BASE + '/api/assign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: body
            }).then(res => res.json()).then(data => {
                if (data.groupe_id && groupMap[groupName]) {
                    groupMap[groupName].dataset.groupeId = data.groupe_id;
                }
            }).catch(() => {});
        });
    });

    // Non affectés : retirer de tous les groupes de CE projet
    const unassignedIds = [...unassigned.querySelectorAll('.student-card')]
        .map(card => parseInt(card.dataset.id));
    if (unassignedIds.length > 0) {
        for (const id of unassignedIds) {
            fetch(API_BASE + '/api/unassign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ eleve_id: id, projet_id: currentProjetId })
            }).catch(() => {});
        }
    }
}

// --- Init ---
loadClasses();
resetGroups();
enableDropZones();
enableRenameGroups();
</script>
{% endblock %}
