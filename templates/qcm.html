<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM — {{ niv.Name_Niv }}</title>
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/qcm.css') }}" rel="stylesheet">
    <style>
        :root {
            {% if niv.qcm_theme %}
            --qcm-head: {{ niv.qcm_theme }};
            --qcm-head-dark: {{ niv.qcm_theme }}cc;
            --qcm-bg: {{ niv.qcm_theme }}22;
            {% else %}
            --qcm-head: #171717;
            --qcm-head-dark: #0a0a0a;
            --qcm-bg: #ccccff;
            {% endif %}
            {% if niv.qcm_bg %}
            --qcm-fd: url('https://duss.alwaysdata.net/myfiles/api/public/dl/xVPGqUDX/{{ niv.qcm_bg }}.jpg?inline=true');
            {% else %}
            --qcm-fd: none;
            {% endif %}
        }
    </style>
</head>
<body class="qcm-page">
    <div id="qcm-menu" class="qcm-menu-bar"></div>
    <div id="qcm-content" class="qcm-content hidden"></div>

    <script>var API_BASE = "{{ url_for('static', filename='x') }}".split("/static")[0];</script>
    <script src="{{ url_for('static', filename='js/modules/qcm-alert.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/qcm-menu.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/qcm-engine.js') }}"></script>
    <script>
    (function () {
        var menuContainer = document.getElementById("qcm-menu");
        var contentArea = document.getElementById("qcm-content");
        var nivId = {{ niv.No_Niv }};

        fetch(API_BASE + "/api/activites/niveau/" + nivId)
            .then(function (r) {
                if (!r.ok) throw new Error("Erreur API: " + r.status);
                return r.json();
            })
            .then(function (chapitres) {
                if (!chapitres || !chapitres.length) {
                    menuContainer.innerHTML = "<p style='text-align:center;margin-top:40px;'>Aucune activit&eacute; pour ce niveau.</p>";
                    return;
                }
                QcmMenu.build(chapitres, menuContainer, "{{ niv.Name_Niv }}");
                QcmEngine.load(chapitres, contentArea);
            })
            .catch(function (err) {
                menuContainer.innerHTML = "<p style='text-align:center;margin-top:40px;color:red;'>Erreur de chargement : " + err.message + "</p>";
            });
    })();
    </script>
</body>
</html>
